<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Bug Free?</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        :root {
            --bg: #0d1117;
            --card: #161b22;
            --text: #c9d1d9;
            --sub: #8b949e;
            --accent: #238636;
            --border: #30363d;
            --hover: #21262d;
            --wrong: rgba(248, 81, 73, 0.15);
            --correct: rgba(46, 160, 67, 0.15);
            --correct-text: #3fb950;
            --wrong-text: #f85149;
        }

        [data-theme="light"] {
            --bg: #f6f8fa;
            --card: #ffffff;
            --text: #24292f;
            --sub: #57606a;
            --accent: #0969da;
            --border: #d0d7de;
            --hover: #f3f4f6;
            --wrong: #ffebe9;
            --correct: #dafbe1;
            --correct-text: #1a7f37;
            --wrong-text: #cf222e;
        }

        body {
            font-family: -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: 0.3s;
        }

        .external-controls {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .theme-toggle {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .container {
            background: var(--card);
            width: 90%;
            max-width: 850px;
            padding: 40px;
            border-radius: 6px;
            border: 1px solid var(--border);
            position: relative;
        }

        .exit-x {
            position: absolute;
            top: 15px;
            left: 15px;
            background: none;
            border: none;
            color: var(--sub);
            font-size: 20px;
            cursor: pointer;
        }

        h1 {
            font-size: 22px;
            text-align: center;
            margin-bottom: 20px;
        }

        .topic-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .topic-btn {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 18px;
            border-radius: 6px;
            color: var(--text);
            text-align: left;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }

        .topic-btn:hover {
            background: var(--hover);
        }

        .quiz-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--sub);
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .question {
            font-size: 17px;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .opt {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .opt.selected {
            border-color: var(--sub);
            background: var(--hover);
        }

        .opt.correct {
            background: var(--correct);
            border-color: var(--correct-text);
            color: var(--correct-text);
        }

        .opt.wrong {
            background: var(--wrong);
            border-color: var(--wrong-text);
            color: var(--wrong-text);
        }

        .feedback {
            margin-top: 15px;
            padding: 15px;
            border-radius: 6px;
            background: var(--hover);
            border: 1px solid var(--border);
            font-size: 13px;
            display: none;
            line-height: 1.4;
        }

        .nav-btn {
            margin-top: 20px;
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 6px;
            cursor: pointer;
            float: right;
            font-weight: 600;
        }

        .hidden {
            display: none;
        }

        p {
            display: flex;
            justify-content: center;
            align-content: center;
            text-align: center;
            margin-bottom: 30px;
        }

        .topic-btn.completed {
            border-color: var(--correct-text);
            background: var(--correct);
            color: var(--correct-text);
            position: relative;
        }

        .topic-btn.completed::after {
            content: " ✓";
            font-weight: bold;
        }


        .leaderboard-btn {
            background: var(--hover);
            border: 2px dashed var(--border);
            grid-column: span 2;
            justify-content: center;
        }

        /* Estilos del Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: var(--card);
            padding: 30px;
            border-radius: 8px;
            border: 1px solid var(--border);
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .leaderboard-table {
            width: 100%;
            margin-top: 15px;
            border-collapse: collapse;
        }

        .leaderboard-table th,
        .leaderboard-table td {
            padding: 8px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        .winner-link {
            color: var(--accent);
            text-decoration: none;
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        /* Adaptación para móviles */

        @media (max-width: 600px) {
            .container {
                width: 100%;
                max-width: none;
                padding: 20px;
                border: none;
                border-radius: 0;
                min-height: 100vh;
            }

            .topic-grid {
                /* Cambiamos a una sola columna para que se apilen */
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .topic-btn {
                width: 100%;
                /* Asegura que ocupen todo el ancho */
                padding: 20px;
                font-size: 16px;
                display: flex;
                justify-content: flex-start;
                /* Alinea el texto a la izquierda */
            }

            .leaderboard-btn {
                /* En móvil ya no hace falta que ocupe 2 columnas porque solo hay una */
                grid-column: span 1;
            }

            .nav-btn {
                width: 100%;
                float: none;
                padding: 16px;
                font-size: 16px;
                margin-top: 25px;
            }

            .question {
                font-size: 18px;
            }

            .opt {
                padding: 16px;
                font-size: 15px;
                margin-bottom: 10px;
            }
        }

        #img {
            display: block;
            margin-left: auto;
            margin-right: auto;
            max-width: 125px;
        }
    </style>
</head>

            if (
                e.key === "F12" ||
                (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J")) ||
                (e.ctrlKey && e.key === "u")
            ) {
                e.preventDefault();
                return false;

        });

        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.body.dataset.theme = savedTheme;
        document.getElementById('theme-btn').innerText = savedTheme === "light" ? "Dark Mode" : "Light Mode";

        function toggleTheme() {
            const b = document.body;
            const btn = document.getElementById('theme-btn');

            if (b.dataset.theme === "light") {
                b.dataset.theme = "dark";
                btn.innerText = "Light Mode";
                localStorage.setItem('theme', 'dark');
            } else {
                b.dataset.theme = "light";
                btn.innerText = "Dark Mode";
                localStorage.setItem('theme', 'light');
            }
        }

        function init(idx) {
            s = idx; i = 0; pts = 0;
            document.getElementById('home').classList.add('hidden');
            document.getElementById('exit-btn').classList.remove('hidden');
            document.getElementById('quiz').classList.remove('hidden');
            load();
        }

        function load() {
            done = false; cur = null; rem = 30;
            const q = dbFull[s].qs[i];
            document.getElementById('t-name').innerText = dbFull[s].t;
            document.getElementById('q-count').innerText = `Q ${i + 1}/10`;
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('feed').style.display = 'none';
            document.getElementById('action-btn').innerText = "Confirmar";
            document.getElementById('action-btn').disabled = true;

            const box = document.getElementById('opts');
            box.innerHTML = '';
            q.a.forEach((t, idx) => {
                const d = document.createElement('div');
                d.className = 'opt';
                d.innerText = t;
                d.onclick = () => {
                    if (!done) {
                        cur = idx;
                        Array.from(box.children).forEach(c => c.classList.remove('selected'));
                        d.classList.add('selected');
                        document.getElementById('action-btn').disabled = false;
                    }
                };
                box.appendChild(d);
            });
            startClock();
        }

        function startClock() {
            clearInterval(clk);
            document.getElementById('clock').innerText = rem;
            clk = setInterval(() => {
                rem--; document.getElementById('clock').innerText = rem;
                if (rem <= 0) { clearInterval(clk); if (!done) { cur = null; step(); } }
            }, 1000);
        }

        function step() {
            const q = dbFull[s].qs[i];
            if (!done) {
                clearInterval(clk); done = true;
                const os = document.getElementById('opts').children;
                if (cur === q.c) { pts++; os[q.c].classList.add('correct'); }
                else { if (cur !== null) os[cur].classList.add('wrong'); os[q.c].classList.add('correct'); }

                const f = document.getElementById('feed');
                f.innerHTML = `<strong>${cur === q.c ? '¡Correcto!' : 'Incorrecto'}</strong><br>${q.e}`;
                f.style.display = 'block';
                document.getElementById('action-btn').innerText = "Siguiente";
            } else {
                i++; if (i < 10) load(); else finish();
            }
        }

        function backToHome() {
            clearInterval(clk);
            document.getElementById('quiz').classList.add('hidden');
            document.getElementById('finish').classList.add('hidden');
            document.getElementById('exit-btn').classList.add('hidden');
            document.getElementById('home').classList.remove('hidden');
        }

            const topicButtons = document.querySelectorAll('.topic-btn');

            if (topicButtons[s]) {
                topicButtons[s].classList.add('completed');

            document.getElementById('quiz').classList.add('hidden');
            document.getElementById('finish').classList.remove('hidden');

            const porcentaje = (pts / 10) * 100;

            if (pts >= 7) {

            }
        }

        let totalSeconds = 0;


        function init(idx) {
            s = idx; i = 0; pts = 0;

            document.getElementById('home').classList.add('hidden');

        function startClock() {
            clearInterval(clk);
            document.getElementById('clock').innerText = rem;
            clk = setInterval(() => {
                rem--;
                totalSeconds++;
                document.getElementById('clock').innerText = rem;
                if (rem <= 0) { clearInterval(clk); if (!done) { cur = null; step(); } }
            }, 1000);
        }

        function finish() {
            const topicButtons = document.querySelectorAll('.topic-btn');
            if (topicButtons[s]) {
                topicButtons[s].classList.add('completed');
                completedTests.add(s);
            }

            document.getElementById('quiz').classList.add('hidden');
            document.getElementById('finish').classList.remove('hidden');

            const porcentaje = (pts / 10) * 100;
            document.getElementById('final-res').innerText = `Tu puntaje: ${porcentaje}% (${pts}/10)`;

            if (pts >= 7) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }

            if (completedTests.size === 7) {
                setTimeout(showWinModal, 1000);
            }
        }

        function showWinModal() {
            const name = prompt("¡INCREÍBLE! Completaste todos los desafíos. Escribí tu nombre en el Leaderboard:");
            if (name) {
                const stats = {
                    name: name,
                    time: totalSeconds,
                    date: new Date().toLocaleDateString()
                };
                saveScore(stats);
                showLeaderboard();
            }
        }

        function saveScore(newScore) {
            let scores = JSON.parse(localStorage.getItem('quiz_scores') || '[]');
            scores.push(newScore);
            scores.sort((a, b) => a.time - b.time);
            localStorage.setItem('quiz_scores', JSON.stringify(scores.slice(0, 5)));
        }

            let rows = scores.map((s, idx) => `
        <tr>
            <td>#${idx + 1}</td>
            <td>${s.name}</td>
            <td>${s.time}s</td>
        </tr>
    `).join('');

            const modalHTML = `
        <div class="modal-overlay">
            <div class="modal-content">
                <h2>🏆The Leaderboard</h2>
                <table class="leaderboard-table">
                    <thead>
                        <tr><th>Pos</th><th>Nombre</th><th>Tiempo</th></tr>
                    </thead>
                    <tbody>${rows || '<tr><td colspan="3">Aún no hay récords</td></tr>'}</tbody>
                </table>
                <a href="https://www.youtube.com/watch?v=uXFpavraI_s&t=15s" target="_blank" class="winner-link">
                    🎵 ¡Escuchar himno de victoria!
                </a>
                <br>
                <button class="nav-btn" style="float:none; margin-top:20px" onclick="closeModal()">Cerrar</button>
            </div>
        </div>
    `;
            document.getElementById('modal-container').innerHTML = modalHTML;
        }

        function closeModal() {
            document.getElementById('modal-container').innerHTML = '';
        }
    </script>
</body>

</html>
