<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Bug Free?</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --text: #c9d1d9;
            --sub: #8b949e;
            --accent: #238636;
            --border: #30363d;
            --hover: #21262d;
            --wrong: rgba(248, 81, 73, 0.15);
            --correct: rgba(46, 160, 67, 0.15);
            --correct-text: #3fb950;
            --wrong-text: #f85149;
        }

        [data-theme="light"] {
            --bg: #f6f8fa;
            --card: #ffffff;
            --text: #24292f;
            --sub: #57606a;
            --accent: #0969da;
            --border: #d0d7de;
            --hover: #f3f4f6;
            --wrong: #ffebe9;
            --correct: #dafbe1;
            --correct-text: #1a7f37;
            --wrong-text: #cf222e;
        }

        body {
            font-family: -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: 0.3s;
        }

        .external-controls {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .theme-toggle {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .container {
            background: var(--card);
            width: 90%;
            max-width: 850px;
            padding: 40px;
            border-radius: 6px;
            border: 1px solid var(--border);
            position: relative;
        }

        .exit-x {
            position: absolute;
            top: 15px;
            left: 15px;
            background: none;
            border: none;
            color: var(--sub);
            font-size: 20px;
            cursor: pointer;
        }

        h1 {
            font-size: 22px;
            text-align: center;
            margin-bottom: 20px;
        }

        .topic-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .topic-btn {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 18px;
            border-radius: 6px;
            color: var(--text);
            text-align: left;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }

        .topic-btn:hover {
            background: var(--hover);
        }

        .quiz-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--sub);
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .question {
            font-size: 17px;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .opt {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .opt.selected {
            border-color: var(--sub);
            background: var(--hover);
        }

        .opt.correct {
            background: var(--correct);
            border-color: var(--correct-text);
            color: var(--correct-text);
        }

        .opt.wrong {
            background: var(--wrong);
            border-color: var(--wrong-text);
            color: var(--wrong-text);
        }

        .feedback {
            margin-top: 15px;
            padding: 15px;
            border-radius: 6px;
            background: var(--hover);
            border: 1px solid var(--border);
            font-size: 13px;
            display: none;
            line-height: 1.4;
        }

        .nav-btn {
            margin-top: 20px;
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 6px;
            cursor: pointer;
            float: right;
            font-weight: 600;
        }

        .hidden {
            display: none;
        }

        p {
            display: flex;
            justify-content: center;
            align-content: center;
            text-align: center;
            margin-bottom: 30px;
        }
    </style>
</head>

<body oncontextmenu="return false;">

    <div class="external-controls">
        <button id="theme-btn" class="theme-toggle" onclick="toggleTheme()">Light Mode</button>
    </div>

    <div class="container">
        <button id="exit-btn" class="exit-x hidden" onclick="backToHome()">✕</button><br>

        <div id="home">
            <h1>Metodología de pruebas de software</h1>
            <p>Test choice de 70 preguntas para practicar</p>
            <div class="topic-grid">
                <button class="topic-btn" onclick="init(0)"></i> 1. V&V y Riesgos</button>
                <button class="topic-btn" onclick="init(1)"></i> 2. Gestión QA/QC/QM</button>
                <button class="topic-btn" onclick="init(2)"></i> 3. Historias e INVEST</button>
                <button class="topic-btn" onclick="init(3)"></i> 4. Manifiesto Ágil</button>
                <button class="topic-btn" onclick="init(4)"></i> 5. Cuadrantes y Niveles</button>
                <button class="topic-btn" onclick="init(5)"></i> 6. SDLC y Modelo V</button>
                <button class="topic-btn" onclick="init(6)"></i> 7. Defectos e ISO 25010</button>
            </div>
        </div>

        <div id="quiz" class="hidden">
            <div class="quiz-info">
                <span id="t-name"></span>
                <span>Tiempo: <span id="clock" style="color:var(--wrong-text)">30</span>s</span>
                <span id="q-count"></span>
            </div>
            <div id="q-text" class="question"></div>
            <div id="opts" class="options"></div>
            <div id="feed" class="feedback"></div>
            <button id="action-btn" class="nav-btn" onclick="step()" disabled>Confirmar</button>
        </div>

        <div id="finish" class="hidden" style="text-align: center;">
            <h2 id="final-res"></h2>
            <button class="nav-btn" style="float:none" onclick="location.reload()">Volver al Menú</button>
        </div>
    </div>

                    { q: "Pruebas de Sistema evalúan:", a: ["Código", "Producto completo integrado", "DB aislada", "Contrato"], c: 1, e: "Visión end-to-end del software funcional." },
                    { q: "UAT es realizado por:", a: ["Dev", "Usuario final/Cliente", "Scrum Master", "Robot"], c: 1, e: "Valida aptitud para uso en mundo real." },
                    { q: "Pruebas de Humo (Smoke) sirven para:", a: ["Incendios", "Verificar funciones básicas operativas", "Temp", "Seguridad"], c: 1, e: "Decidir si vale la pena seguir testeando una versión." }
                ]
            },
            {
                t: "SDLC y Modelo V", qs: [
                    { q: "¿Qué es SDLC?", a: ["Data Logic", "Software Development Life Cycle", "Design Code", "Digital Cycle"], c: 1, e: "Proceso de creación, mantenimiento y retiro." },
                    { q: "En Modelo V, las pruebas se planifican:", a: ["Al final", "En paralelo a definición/diseño", "Después entrega", "Nunca"], c: 1, e: "Cada fase de desarrollo tiene su par de prueba." },
                    { q: "Requerimientos se corresponde con:", a: ["Unitarias", "Aceptación", "Componentes", "Integración"], c: 1, e: "Requisitos definen qué aceptará el usuario." },
                    { q: "La Codificación precede a:", a: ["Sistema", "Unitarias", "Negocio", "Venta"], c: 1, e: "Tras escribir código, se hacen pruebas de unidad." },
                    { q: "Ventaja del Modelo V:", a: ["Flexible", "Niveles claros desde inicio", "Sin doc", "Barato"], c: 1, e: "Aporta estructura y disciplina a la calidad." },
                    { q: "El mantenimiento ocurre:", a: ["Solo bugs", "Tras entrega (Corregir/Adaptar)", "En codificación", "Antes diseño"], c: 1, e: "Fase donde el software evoluciona vivo." },
                    { q: "Cascada (Waterfall), testing empieza:", a: ["Día 1", "Cuando desarrollo termina", "Requerimientos", "Mitad"], c: 1, e: "Crítica: el testing llega demasiado tarde." },
                    { q: "Shift Left Testing propone:", a: ["Mover final", "Probar lo más temprano posible", "Eliminar testers", "Linux"], c: 1, e: "Hallar errores antes es más barato." },
                    { q: "Diseño Detallado se valida con:", a: ["Sistema", "Integración", "Unitarias", "Aceptación"], c: 1, e: "Diseño técnico cuando componentes interactúan." },
                    { q: "SDLC termina cuando:", a: ["Entrega", "Software es retirado de uso", "Tester duerme", "Pagan"], c: 1, e: "Incluye hasta el retiro final del producto." }
                ]
            },
            {
                t: "ISO 25010", qs: [
                    { q: "Un 'Error' es cometido por:", a: ["Software", "Humano (Dev/Analista)", "Hardware", "Usuario"], c: 1, e: "Equivocación humana que produce defecto." },
                    { q: "Un 'Defecto' (Bug) reside en:", a: ["Mente", "Código o documentación", "Manual", "Factura"], c: 1, e: "Manifestación física del error en artefacto." },
                    { q: "Un 'Fallo' ocurre cuando:", a: ["Compila", "Software presenta comportamiento incorrecto en ejecución", "Reporte", "Luz"], c: 1, e: "Desviación visible del servicio esperado." },
                    { q: "Adecuación Funcional:", a: ["Rápido", "Hace lo que debe hacer", "Fácil", "Seguro"], c: 1, e: "Grado en que funciones cubren necesidades." },
                    { q: "Usabilidad mide:", a: ["Velocidad", "Facilidad aprendizaje y uso", "Ataques", "Instalación"], c: 1, e: "Satisfacción y facilidad de operar." },
                    { q: "Mantenibilidad:", a: ["Fácil modificar a futuro", "Servidor ON", "Barato", "Móvil"], c: 0, e: "Cambios rápidos sin romper todo." },
                    { q: "Fiabilidad implica:", a: ["Bonito", "Funciona bajo condiciones por tiempo definido", "Traducir", "Manual"], c: 1, e: "Capacidad de mantener nivel de rendimiento." },
                    { q: "Portabilidad evalúa:", a: ["Peso", "Facilidad trasladar entre entornos", "Licencia", "Colores"], c: 1, e: "Mover entre SO o servidores fácilmente." },
                    { q: "Eficiencia de Desempeño:", a: ["Líneas", "Tiempos respuesta y recursos", "Ortografía", "Marca"], c: 1, e: "Comportamiento bajo carga (Velocidad/RAM)." },
                    { q: "Seguridad busca:", a: ["No borre", "Protección datos y acceso autorizado", "Antivirus", "No robo"], c: 1, e: "Protección de info para evitar accesos no deseados." }
                ]
            }
        ];


        document.addEventListener('keydown', (e) => {

            if (
                e.key === "F12" ||
                (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J")) ||
                (e.ctrlKey && e.key === "u")
            ) {
                e.preventDefault();
                return false;
            }
        });

        document.addEventListener('contextmenu', (e) => e.preventDefault());

        let s = 0, i = 0, pts = 0, clk, rem = 30, done = false, cur = null;

        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.body.dataset.theme = savedTheme;
        document.getElementById('theme-btn').innerText = savedTheme === "light" ? "Dark Mode" : "Light Mode";

        function toggleTheme() {
            const b = document.body;
            const btn = document.getElementById('theme-btn');

            if (b.dataset.theme === "light") {
                b.dataset.theme = "dark";
                btn.innerText = "Light Mode";
                localStorage.setItem('theme', 'dark');
            } else {
                b.dataset.theme = "light";
                btn.innerText = "Dark Mode";
                localStorage.setItem('theme', 'light');
            }
        }

        function init(idx) {
            s = idx; i = 0; pts = 0;
            document.getElementById('home').classList.add('hidden');
            document.getElementById('exit-btn').classList.remove('hidden');
            document.getElementById('quiz').classList.remove('hidden');
            load();
        }

        function load() {
            done = false; cur = null; rem = 30;
            const q = dbFull[s].qs[i];
            document.getElementById('t-name').innerText = dbFull[s].t;
            document.getElementById('q-count').innerText = `Q ${i + 1}/10`;
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('feed').style.display = 'none';
            document.getElementById('action-btn').innerText = "Confirmar";
            document.getElementById('action-btn').disabled = true;

            const box = document.getElementById('opts');
            box.innerHTML = '';
            q.a.forEach((t, idx) => {
                const d = document.createElement('div');
                d.className = 'opt';
                d.innerText = t;
                d.onclick = () => {
                    if (!done) {
                        cur = idx;
                        Array.from(box.children).forEach(c => c.classList.remove('selected'));
                        d.classList.add('selected');
                        document.getElementById('action-btn').disabled = false;
                    }
                };
                box.appendChild(d);
            });
            startClock();
        }

        function startClock() {
            clearInterval(clk);
            document.getElementById('clock').innerText = rem;
            clk = setInterval(() => {
                rem--; document.getElementById('clock').innerText = rem;
                if (rem <= 0) { clearInterval(clk); if (!done) { cur = null; step(); } }
            }, 1000);
        }

        function step() {
            const q = dbFull[s].qs[i];
            if (!done) {
                clearInterval(clk); done = true;
                const os = document.getElementById('opts').children;
                if (cur === q.c) { pts++; os[q.c].classList.add('correct'); }
                else { if (cur !== null) os[cur].classList.add('wrong'); os[q.c].classList.add('correct'); }

                const f = document.getElementById('feed');
                f.innerHTML = `<strong>${cur === q.c ? '¡Correcto!' : 'Incorrecto'}</strong><br>${q.e}`;
                f.style.display = 'block';
                document.getElementById('action-btn').innerText = "Siguiente";
            } else {
                i++; if (i < 10) load(); else finish();
            }
        }

        function backToHome() {
            clearInterval(clk);
            document.getElementById('quiz').classList.add('hidden');
            document.getElementById('finish').classList.add('hidden');
            document.getElementById('exit-btn').classList.add('hidden');
            document.getElementById('home').classList.remove('hidden');
        }

        function finish() {
            document.getElementById('quiz').classList.add('hidden');
            document.getElementById('finish').classList.remove('hidden');
            document.getElementById('final-res').innerText = `Tu puntaje: ${(pts / 10) * 100}% (${pts}/10)`;
        }

        document.onkeydown = (e) => { if (e.keyCode == 123) return false; };
    </script>
</body>

</html>
