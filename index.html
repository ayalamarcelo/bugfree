<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Bug Free?</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        :root {
            --bg: #0d1117;
            --card: #161b22;
            --text: #c9d1d9;
            --sub: #8b949e;
            --accent: #238636;
            --border: #30363d;
            --hover: #21262d;
            --wrong: rgba(248, 81, 73, 0.15);
            --correct: rgba(46, 160, 67, 0.15);
            --correct-text: #3fb950;
            --wrong-text: #f85149;
        }

        [data-theme="light"] {
            --bg: #f6f8fa;
            --card: #ffffff;
            --text: #24292f;
            --sub: #57606a;
            --accent: #0969da;
            --border: #d0d7de;
            --hover: #f3f4f6;
            --wrong: #ffebe9;
            --correct: #dafbe1;
            --correct-text: #1a7f37;
            --wrong-text: #cf222e;
        }

        body {
            font-family: -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: 0.3s;
        }

        .external-controls {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .theme-toggle {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .container {
            background: var(--card);
            width: 90%;
            max-width: 850px;
            padding: 40px;
            border-radius: 6px;
            border: 1px solid var(--border);
            position: relative;
        }

        .exit-x {
            position: absolute;
            top: 15px;
            left: 15px;
            background: none;
            border: none;
            color: var(--sub);
            font-size: 20px;
            cursor: pointer;
        }

        h1 {
            font-size: 22px;
            text-align: center;
            margin-bottom: 20px;
        }

        .topic-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .topic-btn {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 18px;
            border-radius: 6px;
            color: var(--text);
            text-align: left;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }

        .topic-btn:hover {
            background: var(--hover);
        }

        .quiz-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--sub);
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .question {
            font-size: 17px;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .opt {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .opt.selected {
            border-color: var(--sub);
            background: var(--hover);
        }

        .opt.correct {
            background: var(--correct);
            border-color: var(--correct-text);
            color: var(--correct-text);
        }

        .opt.wrong {
            background: var(--wrong);
            border-color: var(--wrong-text);
            color: var(--wrong-text);
        }

        .feedback {
            margin-top: 15px;
            padding: 15px;
            border-radius: 6px;
            background: var(--hover);
            border: 1px solid var(--border);
            font-size: 13px;
            display: none;
            line-height: 1.4;
        }

        .nav-btn {
            margin-top: 20px;
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 6px;
            cursor: pointer;
            float: right;
            font-weight: 600;
        }

        .hidden {
            display: none;
        }

        p {
            display: flex;
            justify-content: center;
            align-content: center;
            text-align: center;
            margin-bottom: 30px;
        }

        .topic-btn.completed {
            border-color: var(--correct-text);
            background: var(--correct);
            color: var(--correct-text);
            position: relative;
        }

        .topic-btn.completed::after {
            content: " ✓";
            font-weight: bold;
        }


        .leaderboard-btn {
            background: var(--hover);
            border: 2px dashed var(--border);
            grid-column: span 2;
            justify-content: center;
        }

        /* Estilos del Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: var(--card);
            padding: 30px;
            border-radius: 8px;
            border: 1px solid var(--border);
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .leaderboard-table {
            width: 100%;
            margin-top: 15px;
            border-collapse: collapse;
        }

        .leaderboard-table th,
        .leaderboard-table td {
            padding: 8px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        .winner-link {
            color: var(--accent);
            text-decoration: none;
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        /* Adaptación para móviles */

        @media (max-width: 600px) {
            .container {
                width: 100%;
                max-width: none;
                padding: 20px;
                border: none;
                border-radius: 0;
                min-height: 100vh;
            }

            .topic-grid {
                /* Cambiamos a una sola columna para que se apilen */
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .topic-btn {
                width: 100%;
                /* Asegura que ocupen todo el ancho */
                padding: 20px;
                font-size: 16px;
                display: flex;
                justify-content: flex-start;
                /* Alinea el texto a la izquierda */
            }

            .leaderboard-btn {
                /* En móvil ya no hace falta que ocupe 2 columnas porque solo hay una */
                grid-column: span 1;
            }

            .nav-btn {
                width: 100%;
                float: none;
                padding: 16px;
                font-size: 16px;
                margin-top: 25px;
            }

            .question {
                font-size: 18px;
            }

            .opt {
                padding: 16px;
                font-size: 15px;
                margin-bottom: 10px;
            }
        }
    </style>
</head>

<body oncontextmenu="return false;">

        <button id="theme-btn" class="theme-toggle" onclick="toggleTheme()">Light Mode</button>

    <div class="container">

        <div id="finish" class="hidden" style="text-align: center;">
            <h2 id="final-res"></h2>
            <button class="nav-btn" onclick="backToHome()">Volver al Menú</button>
        </div>
    </div>

                    { q: "El intervalo de entrega preferido para el software es:", a: ["Cada 15 días exactos", "De semanas a un par de meses", "Al finalizar cada trimestre", "Según la carga del equipo"], c: 1, e: "Ciclos cortos permiten obtener feedback rápido y reducir el riesgo de desviaciones." },

            {

                qs: [

                    { q: "Cuadrante 2 (Q2) busca:", a: ["Atacar sistema", "Apoyar al negocio (Historias)", "Rendimiento", "Estrés"], c: 1, e: "Verifica que se cumplan los requisitos de negocio." },
                    { q: "Regresión se ubica principalmente en:", a: ["Q1 y Q2", "Q4", "Solo Q3", "Fuera"], c: 0, e: "Aseguran que lo que funcionaba no se rompió." },
                    { q: "Cuadrante 3 (Q3) es:", a: ["Automatizado", "Manual/Crítica (Exploratorio/Usabilidad)", "DB", "Carga"], c: 1, e: "Uso de intuición y experiencia humana para hallar fallas." },
                    { q: "Cuadrante 4 (Q4) se dedica a:", a: ["Unitarias", "Tecnología/Crítica (Perf/Seguridad)", "Humo", "Historias"], c: 1, e: "Atributos no funcionales con herramientas especializadas." },
                    { q: "Pruebas Unitarias buscan fallas en:", a: ["Integración", "Módulos individuales", "Sistema", "Red"], c: 1, e: "Testeo de unidad mínima aislada." },
                    { q: "Integración verifica:", a: ["UI", "Comunicación entre componentes", "Hardware", "Ortografía"], c: 1, e: "Aseguran que módulos trabajen bien juntos." },
                    { q: "Pruebas de Sistema evalúan:", a: ["Código", "Producto completo integrado", "DB aislada", "Contrato"], c: 1, e: "Visión end-to-end del software funcional." },
                    { q: "UAT es realizado por:", a: ["Dev", "Usuario final/Cliente", "Scrum Master", "Robot"], c: 1, e: "Valida aptitud para uso en mundo real." },
                    { q: "Pruebas de Humo (Smoke) sirven para:", a: ["Incendios", "Verificar funciones básicas operativas", "Temp", "Seguridad"], c: 1, e: "Decidir si vale la pena seguir testeando una versión." }
                ]
            },
            {
                t: "SDLC y Modelo V",
                qs: [
                    { q: "¿Qué es SDLC?", a: ["Data Logic", "Software Development Life Cycle", "Design Code", "Digital Cycle"], c: 1, e: "Proceso de creación, mantenimiento y retiro." },
                    { q: "En Modelo V, las pruebas se planifican:", a: ["Al final", "En paralelo a definición/diseño", "Después entrega", "Nunca"], c: 1, e: "Cada fase de desarrollo tiene su par de prueba." },
                    { q: "Requerimientos se corresponde con:", a: ["Unitarias", "Aceptación", "Componentes", "Integración"], c: 1, e: "Requisitos definen qué aceptará el usuario." },
                    { q: "La Codificación precede a:", a: ["Sistema", "Unitarias", "Negocio", "Venta"], c: 1, e: "Tras escribir código, se hacen pruebas de unidad." },
                    { q: "Ventaja del Modelo V:", a: ["Flexible", "Niveles claros desde inicio", "Sin doc", "Barato"], c: 1, e: "Aporta estructura y disciplina a la calidad." },
                    { q: "El mantenimiento ocurre:", a: ["Solo bugs", "Tras entrega (Corregir/Adaptar)", "En codificación", "Antes diseño"], c: 1, e: "Fase donde el software evoluciona vivo." },
                    { q: "Cascada (Waterfall), testing empieza:", a: ["Día 1", "Cuando desarrollo termina", "Requerimientos", "Mitad"], c: 1, e: "Crítica: el testing llega demasiado tarde." },
                    { q: "Shift Left Testing propone:", a: ["Mover final", "Probar lo más temprano posible", "Eliminar testers", "Linux"], c: 1, e: "Hallar errores antes es más barato." },
                    { q: "Diseño Detallado se valida con:", a: ["Sistema", "Integración", "Unitarias", "Aceptación"], c: 1, e: "Diseño técnico cuando componentes interactúan." },
                    { q: "SDLC termina cuando:", a: ["Entrega", "Software es retirado de uso", "Tester duerme", "Pagan"], c: 1, e: "Incluye hasta el retiro final del producto." }
                ]
            },
            {
                t: "ISO 25010",
                qs: [
                    { q: "Un 'Error' es cometido por:", a: ["Software", "Humano (Dev/Analista)", "Hardware", "Usuario"], c: 1, e: "Equivocación humana que produce defecto." },
                    { q: "Un 'Defecto' (Bug) reside en:", a: ["Mente", "Código o documentación", "Manual", "Factura"], c: 1, e: "Manifestación física del error en artefacto." },
                    { q: "Un 'Fallo' ocurre cuando:", a: ["Compila", "Software presenta comportamiento incorrecto en ejecución", "Reporte", "Luz"], c: 1, e: "Desviación visible del servicio esperado." },
                    { q: "Adecuación Funcional:", a: ["Rápido", "Hace lo que debe hacer", "Fácil", "Seguro"], c: 1, e: "Grado en que funciones cubren necesidades." },
                    { q: "Usabilidad mide:", a: ["Velocidad", "Facilidad aprendizaje y uso", "Ataques", "Instalación"], c: 1, e: "Satisfacción y facilidad de operar." },
                    { q: "Mantenibilidad:", a: ["Fácil modificar a futuro", "Servidor ON", "Barato", "Móvil"], c: 0, e: "Cambios rápidos sin romper todo." },
                    { q: "Fiabilidad implica:", a: ["Bonito", "Funciona bajo condiciones por tiempo definido", "Traducir", "Manual"], c: 1, e: "Capacidad de mantener nivel de rendimiento." },
                    { q: "Portabilidad evalúa:", a: ["Peso", "Facilidad trasladar entre entornos", "Licencia", "Colores"], c: 1, e: "Mover entre SO o servidores fácilmente." },
                    { q: "Eficiencia de Desempeño:", a: ["Líneas", "Tiempos respuesta y recursos", "Ortografía", "Marca"], c: 1, e: "Comportamiento bajo carga (Velocidad/RAM)." },
                    { q: "Seguridad busca:", a: ["No borre", "Protección datos y acceso autorizado", "Antivirus", "No robo"], c: 1, e: "Protección de info para evitar accesos no deseados." }
                ]
            }
        ];


        document.addEventListener('keydown', (e) => {

            if (
                e.key === "F12" ||
                (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J")) ||
                (e.ctrlKey && e.key === "u")
            ) {
                e.preventDefault();
                return false;
            }
        });

        document.addEventListener('contextmenu', (e) => e.preventDefault());

        let s = 0, i = 0, pts = 0, clk, rem = 30, done = false, cur = null;

        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.body.dataset.theme = savedTheme;
        document.getElementById('theme-btn').innerText = savedTheme === "light" ? "Dark Mode" : "Light Mode";

        function toggleTheme() {
            const b = document.body;
            const btn = document.getElementById('theme-btn');

            if (b.dataset.theme === "light") {
                b.dataset.theme = "dark";
                btn.innerText = "Light Mode";
                localStorage.setItem('theme', 'dark');
            } else {
                b.dataset.theme = "light";
                btn.innerText = "Dark Mode";
                localStorage.setItem('theme', 'light');
            }
        }

        function init(idx) {
            s = idx; i = 0; pts = 0;
            document.getElementById('home').classList.add('hidden');
            document.getElementById('exit-btn').classList.remove('hidden');
            document.getElementById('quiz').classList.remove('hidden');
            load();
        }

        function load() {
            done = false; cur = null; rem = 30;
            const q = dbFull[s].qs[i];
            document.getElementById('t-name').innerText = dbFull[s].t;
            document.getElementById('q-count').innerText = `Q ${i + 1}/10`;
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('feed').style.display = 'none';
            document.getElementById('action-btn').innerText = "Confirmar";
            document.getElementById('action-btn').disabled = true;

            const box = document.getElementById('opts');
            box.innerHTML = '';
            q.a.forEach((t, idx) => {
                const d = document.createElement('div');
                d.className = 'opt';
                d.innerText = t;
                d.onclick = () => {
                    if (!done) {
                        cur = idx;
                        Array.from(box.children).forEach(c => c.classList.remove('selected'));
                        d.classList.add('selected');
                        document.getElementById('action-btn').disabled = false;
                    }
                };
                box.appendChild(d);
            });
            startClock();
        }

        function startClock() {
            clearInterval(clk);
            document.getElementById('clock').innerText = rem;
            clk = setInterval(() => {
                rem--; document.getElementById('clock').innerText = rem;
                if (rem <= 0) { clearInterval(clk); if (!done) { cur = null; step(); } }
            }, 1000);
        }

        function step() {
            const q = dbFull[s].qs[i];
            if (!done) {
                clearInterval(clk); done = true;
                const os = document.getElementById('opts').children;
                if (cur === q.c) { pts++; os[q.c].classList.add('correct'); }
                else { if (cur !== null) os[cur].classList.add('wrong'); os[q.c].classList.add('correct'); }

                const f = document.getElementById('feed');
                f.innerHTML = `<strong>${cur === q.c ? '¡Correcto!' : 'Incorrecto'}</strong><br>${q.e}`;
                f.style.display = 'block';
                document.getElementById('action-btn').innerText = "Siguiente";
            } else {
                i++; if (i < 10) load(); else finish();
            }
        }

        function backToHome() {
            clearInterval(clk);
            document.getElementById('quiz').classList.add('hidden');
            document.getElementById('finish').classList.add('hidden');
            document.getElementById('exit-btn').classList.add('hidden');
            document.getElementById('home').classList.remove('hidden');
        }

        function finish() {
            const topicButtons = document.querySelectorAll('.topic-btn');

            if (topicButtons[s]) {
                topicButtons[s].classList.add('completed');
            }

            document.getElementById('quiz').classList.add('hidden');
            document.getElementById('finish').classList.remove('hidden');

            const porcentaje = (pts / 10) * 100;
            document.getElementById('final-res').innerText = `Tu puntaje: ${porcentaje}% (${pts}/10)`;

            if (pts >= 7) {

                confetti({ particleCount: 100, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 100, angle: 120, spread: 55, origin: { x: 1 } });
            }
        }

        document.onkeydown = (e) => { if (e.keyCode == 123) return false; };


        let completedTests = new Set();
        let totalSeconds = 0;


        function init(idx) {
            s = idx; i = 0; pts = 0;

            document.getElementById('home').classList.add('hidden');
            document.getElementById('exit-btn').classList.remove('hidden');
            document.getElementById('quiz').classList.remove('hidden');
            load();
        }


        function startClock() {
            clearInterval(clk);
            document.getElementById('clock').innerText = rem;
            clk = setInterval(() => {
                rem--;
                totalSeconds++;
                document.getElementById('clock').innerText = rem;
                if (rem <= 0) { clearInterval(clk); if (!done) { cur = null; step(); } }
            }, 1000);
        }

        function finish() {
            const topicButtons = document.querySelectorAll('.topic-btn');
            if (topicButtons[s]) {
                topicButtons[s].classList.add('completed');
                completedTests.add(s);
            }

            document.getElementById('quiz').classList.add('hidden');
            document.getElementById('finish').classList.remove('hidden');

            const porcentaje = (pts / 10) * 100;
            document.getElementById('final-res').innerText = `Tu puntaje: ${porcentaje}% (${pts}/10)`;

            if (pts >= 7) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }

            if (completedTests.size === 7) {
                setTimeout(showWinModal, 1000);
            }
        }

        function showWinModal() {
            const name = prompt("¡INCREÍBLE! Completaste todos los desafíos. Escribí tu nombre en el Leaderboard:");
            if (name) {
                const stats = {
                    name: name,
                    time: totalSeconds,
                    date: new Date().toLocaleDateString()
                };
                saveScore(stats);
                showLeaderboard();
            }
        }

        function saveScore(newScore) {
            let scores = JSON.parse(localStorage.getItem('quiz_scores') || '[]');
            scores.push(newScore);
            scores.sort((a, b) => a.time - b.time);
            localStorage.setItem('quiz_scores', JSON.stringify(scores.slice(0, 5)));
        }

        function showLeaderboard() {
            let scores = JSON.parse(localStorage.getItem('quiz_scores') || '[]');
            let rows = scores.map((s, idx) => `
        <tr>
            <td>#${idx + 1}</td>
            <td>${s.name}</td>
            <td>${s.time}s</td>
        </tr>
    `).join('');

            const modalHTML = `
        <div class="modal-overlay">
            <div class="modal-content">
                <h2>🏆The Leaderboard</h2>
                <table class="leaderboard-table">
                    <thead>
                        <tr><th>Pos</th><th>Nombre</th><th>Tiempo</th></tr>
                    </thead>
                    <tbody>${rows || '<tr><td colspan="3">Aún no hay récords</td></tr>'}</tbody>
                </table>
                <a href="https://www.youtube.com/watch?v=uXFpavraI_s&t=15s" target="_blank" class="winner-link">
                    🎵 ¡Escuchar himno de victoria!
                </a>
                <br>
                <button class="nav-btn" style="float:none; margin-top:20px" onclick="closeModal()">Cerrar</button>
            </div>
        </div>
    `;
            document.getElementById('modal-container').innerHTML = modalHTML;
        }

        function closeModal() {
            document.getElementById('modal-container').innerHTML = '';
        }
    </script>
</body>

</html>
